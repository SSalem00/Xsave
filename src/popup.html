<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xdownloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e7e9ea;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .logo svg {
      color: #1d9bf0;
    }

    .logo h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span {
      font-size: 10px;
      background: #1d9bf022;
      color: #1d9bf0;
      border: 1px solid #1d9bf040;
      border-radius: 4px;
      padding: 1px 5px;
      font-weight: 600;
    }

    p {
      font-size: 12px;
      color: #71767b;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .tip {
      background: #1a1d23;
      border: 1px solid #2f3336;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #8b949e;
      line-height: 1.6;
    }

    .tip strong {
      color: #e7e9ea;
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .footer {
      margin-top: 14px;
      font-size: 10px;
      color: #3d4145;
      text-align: center;
    }

    .footer a {
      color: #1d9bf050;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 2h14v2H5v-2z"/>
    </svg>
    <h1>Xdownloader</h1>
    <span>v1.0</span>
  </div>

  <p>
    A download button is automatically added to tweets that contain video or GIFs.
  </p>

  <div class="tip">
    <strong>How to use</strong>
    Navigate to any tweet with a video or GIF — you'll see a
    <strong>↓</strong> button appear in the action bar. Click it to save.
  </div>

  <div class="footer">
    Open source · <a href="https://github.com/SSalem00/Xdownloader" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
