<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>XSave Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #e7e9ea;
      font-size: 15px;
      line-height: 1.5;
      padding: 20px;
      min-width: 340px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #71767b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2f3336;
    }

    .row:last-child { border-bottom: none; }

    .row-label {
      font-size: 15px;
      color: #e7e9ea;
    }

    .row-sub {
      font-size: 13px;
      color: #71767b;
      margin-top: 2px;
    }

    /* Toggle switch */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #2f3336;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #1d9bf0; }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* Quality select */
    select {
      background: #16181c;
      color: #e7e9ea;
      border: 1px solid #2f3336;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: #1d9bf0; }

    /* Filename template input */
    .template-wrap { margin-top: 8px; }
    input[type="text"] {
      width: 100%;
      background: #16181c;
      color: #e7e9ea;
      border: 1px solid #2f3336;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: ui-monospace, "Cascadia Code", monospace;
      outline: none;
    }
    input[type="text"]:focus { border-color: #1d9bf0; }

    .tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .token {
      background: #16181c;
      border: 1px solid #2f3336;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-family: ui-monospace, "Cascadia Code", monospace;
      color: #1d9bf0;
      cursor: pointer;
      user-select: none;
    }
    .token:hover { background: #1d9bf020; }

    /* Save button */
    .footer {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    button#save {
      background: #1d9bf0;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button#save:hover { background: #1a8cd8; }

    #status { font-size: 13px; color: #00ba7c; display: none; }

    /* Disable quality row when GIF is off */
    .quality-row.disabled { opacity: 0.35; pointer-events: none; }
  </style>
</head>
<body>
  <h1>XSave Settings</h1>

  <div class="section">
    <div class="section-title">GIF Conversion</div>

    <div class="row">
      <div>
        <div class="row-label">Convert animated GIFs to .gif</div>
        <div class="row-sub">Off = download original MP4 instead</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="gifEnabled" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="row quality-row" id="qualityRow">
      <div class="row-label">Quality preset</div>
      <select id="gifQuality">
        <option value="low">Low — 360p · 10 fps</option>
        <option value="medium">Medium — 480p · 15 fps</option>
        <option value="high">High — 720p · 24 fps</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Filename</div>
    <div class="template-wrap">
      <input type="text" id="filenameTemplate" spellcheck="false" />
      <div class="tokens">
        <span class="token" data-token="{username}">{username}</span>
        <span class="token" data-token="{tweetid}">{tweetid}</span>
        <span class="token" data-token="{date}">{date}</span>
        <span class="token" data-token="{type}">{type}</span>
        <span class="token" data-token="{index}">{index}</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <button id="save">Save</button>
    <span id="status">Saved!</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
